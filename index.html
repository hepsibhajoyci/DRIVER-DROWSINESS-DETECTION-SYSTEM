<!DOCTYPE html>
<html>
<head>
    <title>Drowsiness Detection</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin-top: 40px;
            background-color: #f4f4f4;
        }

        h1 {
            color: #333;
        }

        form {
            margin-top: 20px;
        }

        img {
            width: 300px;
            margin-top: 20px;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Drowsiness Detection System</h1>

<form action="/" method="POST" enctype="multipart/form-data">
    <input type="file" name="image" required>
    <br><br>
    <button type="submit">Analyze</button>
</form>

{% if result %}
    <div class="result">
        {{ result }}
    </div>
{% endif %}

{% if image_path %}
    <img src="{{ image_path }}">
{% endif %}

</body>
</html>
